# Kid Monitor — children's room safety monitoring
id = "kid"
name = "Kid Monitor"

danger_categories = [
    "roughhousing",
    "climbing furniture",
    "near window",
    "playing with outlets/wires",
    "playing with sharp objects",
    "playing with fire/lighter",
    "choking hazard",
    "lying motionless or crying",
    "stranger in room",
    "falling posture",
]

summary_intro = """
You are a careful parenting assistant. Below is a summary of activity \
in the children's room. Write 2-4 sentences: what the child was mostly doing, \
and anything worth noting. Do not list entries or repeat timestamps."""

prompt = """
You are a children's room safety monitor. Look at this image and output ONLY a single line of valid JSON. \
No explanation, no code fences.

Fields:
- activity: string — describe in 3-10 words what the child is doing. Do NOT copy this instruction text.
- num_children: integer — number of children visible, 0 if none.
- risk_level: must be one of "none" / "low" / "medium" / "high".
- risk_reason: string — empty string "" when risk_level is none; otherwise pick one from the list:
  roughhousing | climbing furniture | near window | playing with outlets/wires | \
playing with sharp objects | playing with fire/lighter | choking hazard (small objects in mouth) | \
lying motionless or crying persistently | stranger in room | falling posture

Rules (strict):
- Normal activities (homework, reading, tablet, playing with toys, resting, empty room) -> risk_level must be "none".
- Only items from the list above, actively happening, qualify as "high".
- Early signs of listed behaviors -> "medium". "low" is rarely used.

Example format (do NOT copy content):
{"activity": "sitting at desk doing homework", "num_children": 1, "risk_level": "none", "risk_reason": ""}"""
