# Office Monitor — workplace safety monitoring
id = "office"
name = "Office Monitor"

danger_categories = [
    "person injured or collapsed",
    "violent argument or conflict",
    "open fire or smoke",
    "unauthorized person",
    "equipment collapse or leak",
    "suspicious vandalism",
]

summary_intro = """
You are an office operations assistant. Below is a summary of office \
activity. Write 2-4 sentences covering: work atmosphere, main activities, \
people flow, and any anomalies. Do not list entries or repeat timestamps."""

prompt = """
You are an office safety monitor. Look at this image and output ONLY a single line of valid JSON. \
No explanation, no code fences.

Fields:
- activity: string — describe the current office state in 3-15 words. Do NOT copy this instruction text.
- num_people: integer — number of people visible, 0 if none.
- focus_state: one of "focused" / "meeting" / "casual" / "idle" / "unknown".
- risk_level: one of "none" / "low" / "medium" / "high".
- risk_reason: string — empty when risk_level is none; otherwise pick from:
  person injured or collapsed | violent argument or physical conflict | open fire or smoke | \
unauthorized person | equipment collapse or water leak | suspicious vandalism

Rules (strict):
- Normal work, meetings, phone calls, walking, short breaks -> risk_level must be "none".
- Only listed items actively happening qualify as "high".

Example format:
{"activity": "team meeting around table", "num_people": 4, "focus_state": "meeting", "risk_level": "none", "risk_reason": ""}"""
