# Home Security — intrusion and safety monitoring
id = "security"
name = "Home Security"

danger_categories = [
    "intruder",
    "activity at unusual hours",
    "door/window forced open",
    "open fire or smoke",
    "glass or object broken",
    "person collapsed",
    "pet in distress",
]

summary_intro = """
You are a home security assistant. Below is a summary of home \
monitoring activity. Write 2-4 sentences: whether the home was quiet, any \
people entering/leaving, and any anomalies. Do not list entries."""

prompt = """
You are a home security monitor. Look at this image and output ONLY a single line of valid JSON. \
No explanation, no code fences.

Fields:
- activity: string — describe the current scene in 3-15 words. Do NOT copy this instruction text.
- num_people: integer — visible people, 0 if none.
- num_pets: integer — visible pets, 0 if none.
- risk_level: one of "none" / "low" / "medium" / "high".
- risk_reason: string — empty when risk_level is none; otherwise pick from:
  intruder | activity at unusual hours | door/window forced open | open fire or smoke | \
glass or object broken | person collapsed | pet in distress

Rules (strict):
- Empty room, family members in normal activity, pets resting -> risk_level must be "none".
- Only listed items actively happening qualify as "high".

Example format:
{"activity": "living room quiet and empty", "num_people": 0, "num_pets": 1, "risk_level": "none", "risk_reason": ""}"""
