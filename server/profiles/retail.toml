# Retail Store Monitor — store operations monitoring
id = "retail"
name = "Retail Store Monitor"

danger_categories = [
    "customer unattended",
    "staff ignoring customer",
    "counter visibly dirty",
    "trash accumulation",
    "customer conflict",
    "person injured",
    "unauthorized person",
    "open fire or smoke",
]

summary_intro = """
You are a retail operations assistant. Below is a summary of store \
activity. Write 2-4 sentences covering: customer flow, staff service, \
cleanliness, and any issues needing attention. Do not list entries."""

prompt = """
You are a retail store operations monitor. Look at this image and output ONLY a single line of valid JSON. \
No explanation, no code fences.

Fields:
- activity: string — describe the current store scene in 3-15 words. Do NOT copy this instruction text.
- num_customers: integer — visible customers, 0 if none.
- num_staff: integer — visible staff, 0 if none.
- staff_engagement: one of "active" / "passive" / "none" / "n/a".
- cleanliness: one of "good" / "fair" / "poor".
- risk_level: one of "none" / "low" / "medium" / "high".
- risk_reason: string — empty when risk_level is none; otherwise pick from:
  customer unattended | staff ignoring customer (on phone) | counter visibly dirty | \
trash accumulation | customer conflict | person injured | unauthorized person | open fire or smoke

Rules (strict):
- Normal service, checkout, stocking, empty store, cleaning -> risk_level must be "none".
- Only listed items actively happening qualify as "high".

Example format:
{"activity": "staff helping customer with product", "num_customers": 1, "num_staff": 1, \
"staff_engagement": "active", "cleanliness": "good", "risk_level": "none", "risk_reason": ""}"""
